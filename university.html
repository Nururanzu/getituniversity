<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ВУЗ — GetItUniversity</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="icon.png">
</head>
<body>
<header class="topbar"><div class="container topbar__inner"><a class="brand brand--link" href="index.html"><div class="brand__logo brand__logo--img"><img src="icon.png" alt="GetItUniversity"></div><div class="brand__text"><div class="brand__name">GetItUniversity</div><div class="brand__sub">Вернуться к каталогу</div></div></a></div></header>
<main class="container" id="app"></main>
<footer class="footer"><div class="container footer__inner"><div>© <span id="year"></span> GetItUniversity (demo)</div></div></footer>
<script>
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const id=(new URLSearchParams(location.search).get('id')||'').trim().toLowerCase();
fetch('universities.json').then(r=>r.json()).then(unis=>{const u=unis[id];const app=document.getElementById('app');if(!u){app.innerHTML='<section class="notfound"><h1>ВУЗ не найден</h1><p class="muted">Проверь ссылку или вернись в каталог.</p><a class="btn" href="catalog.html">В каталог</a></section>';return;}document.title=`${u.short||'ВУЗ'} — GetItUniversity`;const programs=(u.programs||[]).map(p=>`<li>${esc(p)}</li>`).join('');const steps=(u.admission_steps||[]).map(s=>`<li>${esc(s)}</li>`).join('');const hasInfo=u.admission_period||u.threshold||u.tuition||u.grants||u.dorm;app.innerHTML=`<section class="uni-hero"><h1 class="uni-hero__name">${esc(u.name)}</h1><div class="uni-hero__meta"><span class="pill">${esc(u.city||'')}</span><span class="pill pill--soft">${esc(u.tagline||'')}</span></div>${u.website?`<a class="link" href="${esc(u.website)}" target="_blank" rel="noreferrer">Официальный сайт</a>`:''}</section><section class="two-col"><div class="box"><h3>Описание</h3><p>${esc(u.description||'')}</p></div><div class="box"><h3>Популярные направления</h3><ol type="I"><li>Бакалавриат<ul style="list-style-type:square;">${programs}</ul></li></ol></div><div class="box"><h3>Поступление и стоимость</h3>${hasInfo?`<ul>${u.admission_period?`<li><strong>Приёмная комиссия:</strong> ${esc(u.admission_period)}</li>`:''}${u.threshold?`<li><strong>Пороговый балл:</strong> ${esc(u.threshold)}</li>`:''}${u.tuition?`<li><strong>Стоимость обучения:</strong> ${esc(u.tuition)}</li>`:''}${u.grants?`<li><strong>Гранты/скидки:</strong> ${esc(u.grants)}</li>`:''}${u.dorm?`<li><strong>Общежитие:</strong> ${esc(u.dorm)}</li>`:''}</ul>`:'<p class="muted">Пока нет заполненных данных.</p>'}</div><div class="box"><h3>Как поступить</h3><ul>${steps}</ul></div><div class="box"><h3>Кампус в 360°</h3>${u.streetview_src?`<iframe src="${esc(u.streetview_src)}" width="100%" height="360" style="border:0; border-radius: 14px;" allowfullscreen loading="lazy"></iframe>`:'<p class="muted">Панорама не добавлена.</p>'}</div></section><div class="backline"><a class="btn btn--ghost" href="catalog.html">← Назад в каталог</a></div>`;});
document.getElementById('year').textContent=new Date().getFullYear();
</script>
</body>
</html>
