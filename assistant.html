<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ИИ-консультант — GetInUniversity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

  <style>
    .chat-wrapper{max-width:800px;margin:40px auto;}
    .chat-box{background:#111827;padding:20px;border-radius:16px;min-height:300px;max-height:500px;overflow-y:auto;}
    .msg{margin-bottom:15px;padding:12px;border-radius:12px;}
    .user{background:#2563eb;color:#fff;}
    .ai{background:#1f2937;color:#e5e7eb;}
    .controls{display:flex;gap:10px;margin-top:15px;}
    .controls input{flex:1;padding:10px;border-radius:8px;border:none;}
    .controls button{padding:10px 16px;border-radius:8px;border:none;background:#22c55e;color:#fff;cursor:pointer;}
  </style>
</head>
<body>
<header class="topbar">
  <div class="container topbar__inner">
    <a href="index.html" class="brand brand--link">
      <div class="brand__logo brand__logo--img">
        <img src="icon.png" alt="GetItUniversity">
      </div>
      <div>
        <div class="brand__name">GetInUniversity</div>
        <div class="brand__sub">Каталог университетов</div>
      </div>
    </a>

    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn--ghost" id="themeToggle">🎨 Тема</button>
    </div>
  </div>
</header>

<div class="chat-wrapper">
  <h1>ИИ-консультант GetInUniversity</h1>

  <div id="chatBox" class="chat-box">
    <div class="msg ai">
      👋 Спроси, например:
      <br>— Дай подробную информацию про KBTU
      <br>— Лучшие университеты для IT в Казахстане
    </div>
  </div>

  <div class="controls">
    <input id="userInput" type="text" placeholder="Введите вопрос...">
    <button id="askBtn">Спросить</button>
  </div>
</div>

<script>
function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getGeminiApiKey() {
  const keyFromStorage = localStorage.getItem('giu-gemini-api-key');
  const keyFromWindow = window.GEMINI_API_KEY='AIzaSyDE4MjVo9V_n2qFjjUTrtJmwUZOkXo5IUE';
  return (keyFromStorage || keyFromWindow || '').trim();
}

async function sendMessage(){
  const input = document.getElementById('userInput');
  const chat = document.getElementById('chatBox');
  const text = input.value.trim();
  if(!text) return;

  chat.innerHTML += `<div class="msg user">${escapeHtml(text)}</div>`;
  input.value = '';

  chat.innerHTML += `<div class="msg ai" id="loading">ИИ думает...</div>`;
  chat.scrollTop = chat.scrollHeight;

  const apiKey = getGeminiApiKey();
  const body = {
    contents: [{parts: [{text: `Ты ИИ-консультант сайта GetInUniversity. Отвечай кратко и структурированно. Вопрос: ${text}`}]}]
  };

  if (!apiKey) {
    document.getElementById('loading')?.remove();
    chat.innerHTML += `<div class="msg ai">Добавьте API-ключ Gemini в localStorage под ключом <code>giu-gemini-api-key</code> или в <code>window.GEMINI_API_KEY</code>.</div>`;
    chat.scrollTop = chat.scrollHeight;
    return;
  }

  try {
    const models = ['gemini-1.5-flash'];
    let data = null;
    let lastError = null;

    for (const model of models) {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });

      const candidate = await response.json();
      if (response.ok && candidate?.candidates?.[0]?.content?.parts?.[0]?.text) {
        data = candidate;
        break;
      }
      lastError = candidate?.error?.message || candidate?.error || `Model ${model} failed`;
    }

    document.getElementById('loading')?.remove();

    const answer =
      data?.candidates?.[0]?.content?.parts?.[0]?.text ||
      lastError ||
      'Не удалось получить ответ от Gemini. Проверьте API-ключ и доступ к модели.';

    chat.innerHTML += `<div class="msg ai">${escapeHtml(answer).replace(/\n/g, '<br>')}</div>`;
    chat.scrollTop = chat.scrollHeight;
  } catch (e) {
    document.getElementById('loading')?.remove();
    chat.innerHTML += `<div class="msg ai">Ошибка: ${e.message}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }
}

document.getElementById('askBtn').addEventListener('click', sendMessage);
document.getElementById('userInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

(function(){
  const root = document.documentElement;
  const btn = document.getElementById('themeToggle');
  const KEY = 'giu-theme';

  function apply(theme){
    root.setAttribute('data-theme', theme);
    if (btn) btn.textContent = theme === 'official' ? '🎓 Official' : '⚡ Neon';
  }

  const saved = localStorage.getItem(KEY);
  apply(saved || 'neon');

  btn?.addEventListener('click', () => {
    const current = root.getAttribute('data-theme') || 'neon';
    const next = current === 'neon' ? 'official' : 'neon';
    localStorage.setItem(KEY, next);
    apply(next);
  });
})();
</script>

</body>
</html>
