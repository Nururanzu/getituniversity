<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сравнение ВУЗов — GetItUniversity</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="icon.png">
</head>
<body>
<header class="topbar"><div class="container topbar__inner"><a class="brand brand--link" href="index.html"><div class="brand__logo brand__logo--img"><img src="icon.png" alt="GetItUniversity"></div><div class="brand__text"><div class="brand__name">GetItUniversity</div><div class="brand__sub">Сравнение университетов</div></div></a></div></header>
<main class="container" id="app"></main>
<footer class="footer"><div class="container footer__inner"><div>© <span id="year"></span> GetItUniversity (demo)</div></div></footer>
<script>
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const params=new URLSearchParams(location.search);let ids=params.getAll('ids[]');if(!ids.length&&params.get('ids'))ids=[params.get('ids')];ids=[...new Set(ids.map(v=>String(v).trim().toLowerCase()).filter(Boolean))];
fetch('universities.json').then(r=>r.json()).then(unis=>{const selected=ids.map(id=>[id,unis[id]]).filter(x=>x[1]).slice(0,4);const app=document.getElementById('app');app.innerHTML='<section class="section-head" style="margin-top:26px;"><h2>Сравнение ВУЗов</h2><p class="muted">Выберите 2–4 университета в каталоге.</p></section>';if(selected.length<2){app.innerHTML+=`<section class="notfound"><h1>Недостаточно ВУЗов для сравнения</h1><p class="muted">Сейчас выбрано: ${selected.length}. Вернись в каталог и отметь минимум два университета.</p><a class="btn" href="catalog.html">Вернуться к выбору</a></section>`;return;}const rows=[['Полное название','name'],['Город','city'],['Позиционирование','tagline'],['Сроки приёма / приёмная комиссия','admission_period'],['Пороговый балл','threshold'],['Стоимость обучения','tuition'],['Гранты / скидки','grants'],['Общежитие','dorm']];let body='';rows.forEach(([title,key])=>{body+=`<tr><td class="row-title">${title}</td>${selected.map(([,u])=>`<td>${esc(u[key]||'')}</td>`).join('')}</tr>`});body+=`<tr><td class="row-title">Направления (пример)</td>${selected.map(([,u])=>`<td>${esc((u.programs||[]).join(', ')||'Нет данных')}</td>`).join('')}</tr>`;body+=`<tr><td class="row-title">Официальный сайт</td>${selected.map(([,u])=>`<td>${u.website?`<a class="link" href="${esc(u.website)}" target="_blank" rel="noreferrer">Открыть сайт</a>`:'<span class="muted">Не добавлен</span>'}</td>`).join('')}</tr>`;body+=`<tr><td class="row-title">Страница ВУЗа</td>${selected.map(([id])=>`<td><a class="btn btn--ghost" href="university.html?id=${encodeURIComponent(id)}">Открыть</a></td>`).join('')}</tr>`;app.innerHTML+=`<div class="compare-wrap"><table class="compare-table"><thead><tr><th>Параметр</th>${selected.map(([,u])=>`<th><div class="compare-head"><div class="compare-head__logo">${esc(u.logo||'')}</div><div class="compare-head__short">${esc(u.short||'')}</div><div class="compare-head__city">${esc(u.city||'')}</div></div></th>`).join('')}</tr></thead><tbody>${body}</tbody></table></div><div class="backline"><a class="btn btn--ghost" href="catalog.html">← Изменить выбор</a></div>`;});
document.getElementById('year').textContent=new Date().getFullYear();
</script>
</body>
</html>
